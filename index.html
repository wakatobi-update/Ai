<section class="home">

<!-- SEARCH -->

<div class="search-box">
<input type="text" placeholder="Cari barang atau bantuan di sekitar..." onkeyup="searchItem()">


<!-- TOMBOL POST -->

<div class="post-action">

<button class="jual-btn" onclick="showForm('jual')">
<i class="fa-solid fa-store"></i>
Jual Barang
</button>

<button class="cari-btn" onclick="showForm('cari')">
<i class="fa-solid fa-magnifying-glass"></i>
Butuh Barang
</button>

  </div>


<!-- STATUS POST -->

<div class="post-box" id="postBox" style="display:none;">

<textarea id="postText" placeholder="Tulis apa yang ingin kamu jual atau cari..."></textarea>

<input type="file" id="postImage" accept="image/*" onchange="previewImage()">

<img id="previewImg" style="display:none; width:100%; margin-top:10px; border-radius:10px;">

<button class="post-btn" onclick="postingStatus()">
<i class="fa-solid fa-paper-plane"></i>
Posting
</button>

  </div>


<!-- FEED POST -->

<div class="feed">


<div class="product-card">

<img src="gallery/contoh.jpg">

<div class="product-info">

<h3>🐟 Ikan Segar</h3>

<p class="price">Rp30.000</p>

<p class="location">
<i class="fa-solid fa-location-dot"></i>
Wangi-Wangi
</p>

<div class="product-action">

<button class="chat">
<i class="fa-solid fa-comments"></i>
Chat
</button>

<button class="map">
<i class="fa-solid fa-location-dot"></i>
Map
</button>

<button class="love">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>
