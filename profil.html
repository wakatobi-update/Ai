<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - IKITA</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header>

<div class="header-top">

<div class="logo">IKITA</div>

<div class="header-icons">
<i class="fas fa-search"></i>
<i class="fas fa-map-location-dot"></i>
<i class="fas fa-bars"></i>
</div>

</div>

</header>


<section class="profil">

<div class="profil-card">

<img src="https://i.pravatar.cc/150" class="profil-foto">

<h2>Nama Pengguna</h2>

<p>Wakatobi, Sulawesi Tenggara</p>

<button>Edit Profil</button>

</div>

</section>


<section class="profil-menu">

<div class="menu-item">
<i class="fas fa-box"></i>
<span>Jualan Saya</span>
</div>

<div class="menu-item">
<i class="fas fa-heart"></i>
<span>Favorit</span>
</div>

<div class="menu-item">
<i class="fas fa-comment"></i>
<span>Pesan</span>
</div>

<div class="menu-item">
<i class="fas fa-gear"></i>
<span>Pengaturan</span>
</div>

</section>

<div class="profile-card">

<img id="profilePhoto" src="gallery/default-profile.png" class="profile-photo">

<input type="file" id="uploadPhoto">

<input type="text" id="profileName" placeholder="Nama kamu">

<input type="text" id="profileLocation" placeholder="Lokasi">

<textarea id="profileBio" placeholder="Bio singkat"></textarea>

<button onclick="saveProfile()">Simpan Profil</button>

</div>

<div class="float-post" onclick="showForm('jual')">
<i class="fa-solid fa-plus"></i>
</div> 

<div class="profile-container">

<div class="profile-header">

<img src="gallery/profile.jpg" class="profile-photo">

<div class="profile-name">Nama Pengguna</div>
<div class="profile-location">Wakatobi, Sulawesi Tenggara</div>

<button>Edit Profil</button>

</div>

<div class="profile-menu">

<div>🛍 Jualan Saya</div>
<div>❤ Favorit</div>
<div>💬 Pesan</div>
<div>⚙ Pengaturan</div>

</div>

<div class="profile-form">

<input type="file">

<input type="text" placeholder="Nama kamu">

<input type="text" placeholder="Lokasi">

<textarea placeholder="Bio singkat"></textarea>

<button>Simpan Profil</button>

</div>                                                                  </html>

</body>
</html>
