<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil Saya - IKITA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* background */

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* container */

.profile-container{
max-width:500px;
margin:auto;
}

/* header profil */

.profile-header{
background:linear-gradient(135deg,#0b1b34,#1e3a5f);
color:white;
padding:30px 20px;
text-align:center;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

/* foto profil */

.profile-photo{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-top:10px;
}

/* nama */

.profile-name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

/* lokasi */

.profile-location{
font-size:14px;
opacity:0.9;
}

/* statistik */

.profile-stats{
display:flex;
justify-content:space-around;
background:white;
padding:15px;
margin:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.stat{
text-align:center;
}

.stat b{
font-size:18px;
display:block;
}

/* card edit */

.profile-card{
background:white;
margin:15px;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* input */

.profile-card input,
.profile-card textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* tombol */

.save-btn{
margin-top:15px;
background:#0b1b34;
color:white;
padding:12px;
border:none;
border-radius:12px;
width:100%;
cursor:pointer;
}

/* upload */

.upload{
margin-top:10px;
font-size:13px;
}

</style>

</head>

<body>

<div class="profile-container">

<!-- HEADER PROFIL -->

<div class="profile-header">

<img id="profilePhoto" src="gallery/default-profile.png" class="profile-photo">

<div class="profile-name" id="profileNameDisplay">Pengguna</div>

<div class="profile-location" id="profileLocationDisplay">Lokasi belum diisi</div>

</div>


<!-- STATISTIK -->

<div class="profile-stats">

<div class="stat">
<b id="postCount">0</b>
Posting
</div>

<div class="stat">
<b>0</b>
Suka
</div>

<div class="stat">
<b>0</b>
Pengikut
</div>

</div>


<!-- EDIT PROFIL -->

<div class="profile-card">

<h3>Edit Profil</h3>

<input type="file" id="uploadPhoto" class="upload">

<input type="text" id="profileName" placeholder="Nama Anda">

<input type="text" id="profileLocation" placeholder="Lokasi Anda">

<textarea id="profileBio" placeholder="Bio singkat"></textarea>

<button class="save-btn" onclick="saveProfile()">Simpan Profil</button>

</div>

</div>

let profilePhoto = document.getElementById("profilePhoto")

let nameInput = document.getElementById("profileName")
let locationInput = document.getElementById("profileLocation")
let bioInput = document.getElementById("profileBio")
