<script>

/* =========================
IKITA PROFILE SYSTEM
========================= */

/* ambil elemen */
const photoInput = document.getElementById("uploadPhoto");
const profilePhoto = document.getElementById("profilePhoto");
const nameInput = document.getElementById("profileName");
const locationInput = document.getElementById("profileLocation");
const bioInput = document.getElementById("profileBio");


/* =========================
UPLOAD FOTO PROFIL
========================= */

if(photoInput){
photoInput.addEventListener("change", function(){

const file = this.files[0];
const reader = new FileReader();

reader.onload = function(e){

profilePhoto.src = e.target.result;

localStorage.setItem("ikita_photo", e.target.result);

};

if(file){
reader.readAsDataURL(file);
}

});
}


/* =========================
SIMPAN PROFIL
========================= */

function saveProfile(){

const name = nameInput.value;
const location = locationInput.value;
const bio = bioInput.value;

localStorage.setItem("ikita_name", name);
localStorage.setItem("ikita_location", location);
localStorage.setItem("ikita_bio", bio);

alert("Profil berhasil disimpan");

loadProfile();

}


/* =========================
LOAD PROFIL
========================= */

function loadProfile(){

const name = localStorage.getItem("ikita_name");
const location = localStorage.getItem("ikita_location");
const bio = localStorage.getItem("ikita_bio");
const photo = localStorage.getItem("ikita_photo");


if(name){
nameInput.value = name;

document.querySelectorAll(".profile-name").forEach(el=>{
el.innerText = name;
});

document.querySelectorAll("h2").forEach(el=>{
el.innerText = name;
});
}

if(location){
locationInput.value = location;

document.querySelectorAll(".profile-location").forEach(el=>{
el.innerText = location;
});

document.querySelectorAll(".profil-card p").forEach(el=>{
el.innerText = location;
});
}

if(bio){
bioInput.value = bio;
}

if(photo){

profilePhoto.src = photo;

document.querySelectorAll(".profile-photo").forEach(el=>{
el.src = photo;
});

}

}


/* =========================
POSTING DENGAN PROFIL
========================= */

function createPost(text){

const name = localStorage.getItem("ikita_name") || "Pengguna";
const photo = localStorage.getItem("ikita_photo") || "gallery/default-profile.png";

const postHTML = `
<div class="product-card">

<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
<img src="${photo}" style="width:35px;height:35px;border-radius:50%;">
<b>${name}</b>
</div>

<p>${text}</p>

</div>
`;

const feed = document.querySelector(".feed");

if(feed){
feed.innerHTML = postHTML + feed.innerHTML;
}

}


/* =========================
HALAMAN JUALAN SAYA
========================= */

document.querySelectorAll(".menu-item").forEach(item=>{

if(item.innerText.includes("Jualan")){

item.addEventListener("click", function(){

alert("Halaman Jualan Saya akan menampilkan semua posting milik akun ini.");

});

}

});


/* =========================
LOAD SAAT HALAMAN DIBUKA
========================= */

document.addEventListener("DOMContentLoaded", loadProfile);

  </script>
