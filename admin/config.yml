backend:
  name: github
  repo: wakatobi-update/Ai
  branch: main

media_folder: "Ai/gallery"
public_folder: "/Ai/gallery"

collections:
  - name: "berita"
    label: "Berita"
    folder: "Ai/news"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Isi Berita", name: "body", widget: "markdown"}
      - {label: "Tanggal", name: "date", widget: "datetime"}
      - {label: "Gambar", name: "image", widget: "image"}
