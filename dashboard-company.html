<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Perusahaan</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#22c55e;
color:white;
padding:15px 30px;
font-size:20px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

Dashboard Perusahaan

</header>

<div class="container">

<div class="card">

<h3>Posting Lowongan</h3>

<button>Buat Lowongan</button>

</div>

<div class="card">

<h3>Lowongan Aktif</h3>

<p>Kasir – 3 pelamar</p>

<p>Driver – 5 pelamar</p>

</div>

<div class="card">

<h3>Kandidat Cocok</h3>

<p>Andi – AI Match 92%</p>

<p>Budi – AI Match 85%</p>

</div>

</div>

</body>
  </html>
